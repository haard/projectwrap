[project]
name = "{name}"
dir = "{dir}"
shell = "{shell}"

[sandbox]
enabled = {sandbox_enabled}
# Note: the config directory (~/.config/pwrap) is always blacklisted automatically.
# blacklist = [                   # Additional paths to hide (overlaid with tmpfs)
#     "~/.kube",
#     "~/.aws",
#     "~/.ssh",
# ]
# whitelist = [                   # Exceptions to blacklist (bound back)
#     "~/.kube/{name}",
# ]
# writable = [                    # Extra writable paths (home is read-only)
#     "~/.pyenv/shims",
# ]
# unshare_net = false             # Isolate network namespace
# unshare_pid = true              # Isolate PID namespace (default: true)
# new_session = true              # TIOCSTI protection (auto on kernels < 6.2)

# [encrypted]                      # gocryptfs encrypted volume (sandbox only)
# cipherdir = "encrypted"         # Relative to config dir, or absolute
# mountpoint = "~/.local/share/myapp"  # Where decrypted files appear
# shared = false                  # true = daemon mode (multi-terminal, unix socket)
